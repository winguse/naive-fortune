name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: '20 23 * * 1-5'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Checkout market-data branch
        uses: actions/checkout@v4
        with:
          ref: market-data
          path: market-data-worktree

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update and validate market data
        run: node scripts/update-market-data/index.mjs --market-dir=market-data-worktree

      - name: Force push market-data
        run: |
          cd market-data-worktree
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No market data changes"
            exit 0
          fi
          git commit -m "chore: update market data"
          git push origin HEAD:market-data --force
